<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeGrid - タイムスケジュール管理</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
  <!-- ══════════════ SCHEDULE LIST SCREEN ══════════════ -->
  <div id="schedule-list-screen" class="screen active">
    <header class="top-bar">
      <div class="top-bar-inner">
        <div class="logo">
          <span class="material-icons-round logo-icon">calendar_month</span>
          <h1>TimeGrid</h1>
        </div>
        <p class="tagline">collaborative time-schedule editor</p>
      </div>
    </header>
    <main class="list-container">
      <div class="list-header">
        <h2><span class="material-icons-round">folder_open</span> スケジュール一覧</h2>
        <button id="btn-new-schedule" class="btn btn-primary">
          <span class="material-icons-round">add</span> 新規作成
        </button>
      </div>
      <div id="schedule-list" class="schedule-cards"></div>
      <div id="empty-state" class="empty-state">
        <span class="material-icons-round">event_note</span>
        <p>スケジュールがまだありません</p>
        <button class="btn btn-primary" onclick="document.getElementById('btn-new-schedule').click()">
          <span class="material-icons-round">add</span> 最初のスケジュールを作成
        </button>
      </div>
    </main>
  </div>

  <!-- ══════════════ SCHEDULE EDITOR SCREEN ══════════════ -->
  <div id="editor-screen" class="screen">
    <header class="editor-top-bar">
      <div class="editor-top-bar-inner">
        <button id="btn-back" class="btn btn-ghost" title="一覧に戻る">
          <span class="material-icons-round">arrow_back</span>
        </button>
        <div class="schedule-title-wrap">
          <input id="schedule-title" type="text" class="schedule-title-input" value="Schedule" spellcheck="false">
          <span class="material-icons-round edit-hint">edit</span>
        </div>
        <div class="editor-actions">
          <button id="btn-undo" class="btn btn-icon" title="元に戻す" disabled>
            <span class="material-icons-round">undo</span>
          </button>
          <button id="btn-redo" class="btn btn-icon" title="やり直し" disabled>
            <span class="material-icons-round">redo</span>
          </button>
          <div class="separator"></div>
          <button id="btn-settings" class="btn btn-icon" title="時間設定">
            <span class="material-icons-round">schedule</span>
          </button>
          <button id="btn-manage-places" class="btn btn-icon" title="場所管理">
            <span class="material-icons-round">place</span>
          </button>
          <button id="btn-add-event" class="btn btn-primary btn-sm">
            <span class="material-icons-round">add</span> 予定追加
          </button>
          <div class="separator"></div>
          <button id="btn-export" class="btn btn-icon" title="エクスポート">
            <span class="material-icons-round">download</span>
          </button>
          <button id="btn-print" class="btn btn-icon" title="印刷">
            <span class="material-icons-round">print</span>
          </button>
          <div class="sync-indicator" id="sync-indicator" title="同期状態">
            <span class="material-icons-round">cloud_done</span>
          </div>
        </div>
      </div>
    </header>

    <div class="editor-body">
      <div class="timeline-container" id="timeline-container">
        <!-- The timeline grid will be rendered by JS -->
      </div>
    </div>
  </div>

  <!-- ══════════════ MODALS ══════════════ -->

  <!-- Time Settings Modal -->
  <div class="modal-overlay" id="modal-settings">
    <div class="modal">
      <div class="modal-header">
        <h3><span class="material-icons-round">schedule</span> 時間範囲設定</h3>
        <button class="btn btn-icon modal-close"><span class="material-icons-round">close</span></button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>開始時刻</label>
          <div class="time-input-group">
            <input type="number" id="settings-start-hour" min="0" max="23" value="6" class="time-input">
            <span>:</span>
            <input type="number" id="settings-start-minute" min="0" max="55" step="5" value="0" class="time-input">
          </div>
        </div>
        <div class="form-row">
          <label>終了時刻</label>
          <div class="time-input-group">
            <input type="number" id="settings-end-hour" min="0" max="24" value="22" class="time-input">
            <span>:</span>
            <input type="number" id="settings-end-minute" min="0" max="55" step="5" value="0" class="time-input">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost modal-cancel">キャンセル</button>
        <button class="btn btn-primary" id="btn-save-settings">保存</button>
      </div>
    </div>
  </div>

  <!-- Place Manager Modal -->
  <div class="modal-overlay" id="modal-places">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3><span class="material-icons-round">place</span> 場所管理</h3>
        <button class="btn btn-icon modal-close"><span class="material-icons-round">close</span></button>
      </div>
      <div class="modal-body">
        <div id="place-list" class="place-list"></div>
        <button id="btn-add-place" class="btn btn-outline btn-full">
          <span class="material-icons-round">add</span> 場所を追加
        </button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary modal-close">完了</button>
      </div>
    </div>
  </div>

  <!-- Event Editor Modal -->
  <div class="modal-overlay" id="modal-event">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3 id="event-modal-title"><span class="material-icons-round">event</span> 予定の編集</h3>
        <button class="btn btn-icon modal-close"><span class="material-icons-round">close</span></button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>タイトル</label>
          <input type="text" id="event-title" class="form-input" placeholder="予定のタイトル">
        </div>
        <div class="form-row">
          <label>種類</label>
          <div class="btn-group">
            <button class="btn btn-toggle active" data-type="range" id="event-type-range">
              <span class="material-icons-round">timelapse</span> 期間
            </button>
            <button class="btn btn-toggle" data-type="task" id="event-type-task">
              <span class="material-icons-round">task_alt</span> タスク
            </button>
          </div>
        </div>
        <div class="form-row">
          <label>開始時刻</label>
          <div class="time-input-group">
            <input type="number" id="event-start-hour" min="0" max="23" value="9" class="time-input">
            <span>:</span>
            <input type="number" id="event-start-minute" min="0" max="55" step="5" value="0" class="time-input">
          </div>
        </div>
        <div class="form-row" id="event-end-row">
          <label>終了時刻</label>
          <div class="time-input-group">
            <input type="number" id="event-end-hour" min="0" max="24" value="10" class="time-input">
            <span>:</span>
            <input type="number" id="event-end-minute" min="0" max="55" step="5" value="0" class="time-input">
          </div>
        </div>
        <div class="form-row">
          <label>場所</label>
          <div id="event-place-checkboxes" class="checkbox-group"></div>
        </div>
        <div class="form-row">
          <label>カラー</label>
          <div class="color-picker-row">
            <input type="color" id="event-color" value="#4A90D9" class="color-input">
            <div class="preset-colors" id="preset-colors"></div>
          </div>
        </div>
        <div class="form-row">
          <label>備考欄テキスト</label>
          <input type="text" id="event-notes" class="form-input" placeholder="備考欄に表示するテキスト">
        </div>
        <div class="form-row">
          <label>説明</label>
          <textarea id="event-description" class="form-input form-textarea" placeholder="詳細な説明（任意）"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="btn-delete-event" style="margin-right:auto">
          <span class="material-icons-round">delete</span> 削除
        </button>
        <button class="btn btn-ghost modal-cancel">キャンセル</button>
        <button class="btn btn-primary" id="btn-save-event">保存</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="context-menu">
    <button data-action="edit"><span class="material-icons-round">edit</span> 編集</button>
    <button data-action="duplicate"><span class="material-icons-round">content_copy</span> 複製</button>
    <hr>
    <button data-action="delete" class="danger"><span class="material-icons-round">delete</span> 削除</button>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/state.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/events.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
